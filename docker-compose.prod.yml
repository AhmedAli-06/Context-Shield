version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contextshield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: contextshield
      POSTGRES_USER: cs_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cs_prod_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_admin -d contextshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: contextshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    container_name: contextshield-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    container_name: contextshield-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
